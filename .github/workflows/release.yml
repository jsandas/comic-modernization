name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and release (for manual runs)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            package_ext: tar.gz
          - name: macos-arm64
            os: macos-latest
            package_ext: tar.gz
          - name: windows-x64
            os: windows-latest
            package_ext: zip

    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} # Semantic version tag (for example: v1.2.3)
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y cmake g++ libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake sdl2 sdl2_image sdl2_mixer sdl2_ttf pkg-config

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path 'C:\vcpkg\vcpkg.exe')) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            & C:\vcpkg\bootstrap-vcpkg.bat
          }
          & C:\vcpkg\vcpkg.exe install sdl2 sdl2-image sdl2-mixer sdl2-ttf --triplet x64-windows-static

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${COMMIT_SHA:0:12}" # Build/version identifier derived from commit id
          pkg="captain-comic-${version}-${{ matrix.name }}"
          mkdir -p "dist" "package/${pkg}"

          cp build/captain_comic "package/${pkg}/"
          cp README.md "package/${pkg}/"
          cp -R assets "package/${pkg}/assets"

          tar -czf "dist/${pkg}.tar.gz" -C package "${pkg}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:COMMIT_SHA.Substring(0, 12) # Build/version identifier derived from commit id
          $pkg = "captain-comic-$version-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "package/$pkg" | Out-Null

          Copy-Item "build/Release/captain_comic.exe" "package/$pkg/"
          Copy-Item "README.md" "package/$pkg/"
          Copy-Item "assets" "package/$pkg/assets" -Recurse

          Compress-Archive -Path "package/$pkg" -DestinationPath "dist/$pkg.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: captain-comic-${{ matrix.name }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} # Semantic version tag (for example: v1.2.3)
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}-${{ env.COMMIT_SHA }}
          body: |
            Build version (commit): ${{ env.COMMIT_SHA }}
            Semantic version (tag): ${{ env.TAG_NAME }}
          files: release-assets/*