name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and release (for manual runs)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            package_ext: tar.gz
          - name: macos-arm64
            os: macos-latest
            package_ext: tar.gz
          - name: windows-x64
            os: windows-latest
            package_ext: zip

    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} # Semantic version tag (for example: v1.2.3)
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y cmake g++ libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake sdl2 sdl2_image sdl2_mixer sdl2_ttf pkg-config

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path 'C:\vcpkg\vcpkg.exe')) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            & C:\vcpkg\bootstrap-vcpkg.bat
          }
          & C:\vcpkg\vcpkg.exe install sdl2 sdl2-image sdl2-mixer sdl2-ttf --triplet x64-windows-static

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${COMMIT_SHA:0:12}" # Build/version identifier derived from commit id
          pkg="captain-comic-${version}-${{ matrix.name }}"
          mkdir -p "dist" "package/${pkg}" "package/${pkg}/tools"

          cp build/captain_comic "package/${pkg}/"
          cp README.md "package/${pkg}/"
          cp tools/extract_assets.py "package/${pkg}/tools/"
          cp tools/requirements.txt "package/${pkg}/tools/"

          cat > "package/${pkg}/ASSET_EXTRACTION.md" <<'EOF'
          # Asset Extraction

          Release packages do not include game assets. The original DOS files are copyrighted and must be supplied by the user.

          1. Download the original game archive and unpack it into an `original/` directory:

          ```bash
          curl -L -o comic_r5.zip \
            https://archive.org/download/TheAdventuresOfCaptainComic/AdventuresOfCaptainComicEpisode1The-PlanetOfDeathR5sw1991michaelA.Denioaction.zip
          unzip comic_r5.zip -d original
          rm comic_r5.zip
          ```

          2. Install Python dependencies and run the extractor from the package root:

          ```bash
          pip install -r tools/requirements.txt
          python3 tools/extract_assets.py --orig original
          ```

          3. Start the game after extraction:

          ```bash
          ./captain_comic
          ```
          EOF

          tar -czf "dist/${pkg}.tar.gz" -C package "${pkg}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:COMMIT_SHA.Substring(0, 12) # Build/version identifier derived from commit id
          $pkg = "captain-comic-$version-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "package/$pkg" | Out-Null
          New-Item -ItemType Directory -Force -Path "package/$pkg/tools" | Out-Null

          Copy-Item "build/Release/captain_comic.exe" "package/$pkg/"
          Copy-Item "README.md" "package/$pkg/"
          Copy-Item "tools/extract_assets.py" "package/$pkg/tools/"
          Copy-Item "tools/requirements.txt" "package/$pkg/tools/"

          @'
          # Asset Extraction

          Release packages do not include game assets. The original DOS files are copyrighted and must be supplied by the user.

          1. Download the original game archive and unpack it into an `original/` directory:

          ```bash
          curl -L -o comic_r5.zip \
            https://archive.org/download/TheAdventuresOfCaptainComic/AdventuresOfCaptainComicEpisode1The-PlanetOfDeathR5sw1991michaelA.Denioaction.zip
          unzip comic_r5.zip -d original
          rm comic_r5.zip
          ```

          2. Install Python dependencies and run the extractor from the package root:

          ```bash
          pip install -r tools/requirements.txt
          python3 tools/extract_assets.py --orig original
          ```

          3. Start the game after extraction:

          ```bash
          .\captain_comic.exe
          ```
          '@ | Set-Content -NoNewline "package/$pkg/ASSET_EXTRACTION.md"

          Compress-Archive -Path "package/$pkg" -DestinationPath "dist/$pkg.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: captain-comic-${{ matrix.name }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} # Semantic version tag (for example: v1.2.3)
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: |
            Build version (commit): ${{ env.COMMIT_SHA }}
            Semantic version (tag): ${{ env.TAG_NAME }}
          files: release-assets/*