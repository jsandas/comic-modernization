name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install APT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake nasm python3 python3-pip pkg-config libsdl2-dev libsdl2-image-dev dosbox

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install unicorn

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run CI ASM vs C++ comparator
        run: |
          echo "Running asm_ci_compare..."
          build/src/tests/asm_ci_compare

      - name: Run inline parity python test
        run: |
          echo "Running inline parity python test..."
          python3 src/tests/asm/test_inline_parity.py

      - name: Run ASM probe_index regression test
        run: |
          echo "Running ASM probe_index regression..."
          python3 src/tests/asm/test_probe_index_regression.py

      - name: Run tests (tests dir)
        run: ctest --test-dir build/src/tests --output-on-failure -V

      - name: Show test binaries
        run: ls -la build/src/tests || true
