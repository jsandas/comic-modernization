name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Caching disabled temporarily to simplify CI debugging
      # - name: Cache ccache
      #   uses: actions/cache@v3
      #   with:
      #     path: ~/.ccache
      #     key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}
      #     restore-keys: ${{ runner.os }}-ccache-

      # - name: Cache build directory
      #   uses: actions/cache@v3
      #   with:
      #     path: build
      #     key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt') }}
      #     restore-keys: ${{ runner.os }}-build-

      # - name: Cache Homebrew (macOS)
      #   if: runner.os == 'macOS'
      #   uses: actions/cache@v3
      #   with:
      #     path: /Users/runner/Library/Caches/Homebrew
      #     key: macos-homebrew-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache libsdl2-dev libsdl2-image-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake pkg-config sdl2 sdl2_image ccache
          # Ensure pkg-config can find Homebrew-provided .pc files for SDL2
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          # Help CMake find Homebrew-installed packages by adding brew prefix to CMAKE_PREFIX_PATH
          echo "CMAKE_PREFIX_PATH=$(brew --prefix):$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

      - name: macOS SDL diagnostics
        if: runner.os == 'macOS'
        run: |
          echo "brew --prefix: $(brew --prefix)"

          echo "--- sdl2 pkg-config ---"
          echo "pkg-config --cflags sdl2:" 
          pkg-config --cflags sdl2 || true
          echo "pkg-config --libs sdl2:"
          pkg-config --libs sdl2 || true

          echo "--- sdl2_image pkg-config ---"
          echo "pkg-config --cflags SDL2_image:" 
          pkg-config --cflags SDL2_image || true
          echo "pkg-config --libs SDL2_image:"
          pkg-config --libs SDL2_image || true

          echo "--- SDL2 include dir contents ---"
          echo "ls $(brew --prefix)/include/SDL2 | head -n 200"
          ls -la "$(brew --prefix)/include/SDL2" || true

          echo "--- SDL2_image pkgconfig file ---"
          echo "cat $(brew --prefix)/lib/pkgconfig/SDL2_image.pc"
          cat "$(brew --prefix)/lib/pkgconfig/SDL2_image.pc" || true

          echo "--- lib pkgconfig dir ---"
          ls -la "$(brew --prefix)/lib/pkgconfig" || true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build & run tests
        run: cmake --build build --target check -- -j
